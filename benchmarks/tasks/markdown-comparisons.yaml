schema_version: 1
repository: ../..
revision: 504e823853459fef0c66e0b02915b4fc59ec3151
prompt: >-
  Add a concise Paired comparisons section to the generated Markdown report.
  Show the existing SigMap-to-raw success-rate, median-runtime, and
  median-input-token ratios. Render null ratios as "n/a" and do not invent
  percentage claims.
  Update focused deterministic-report tests and the benchmark methodology docs.
  Run the relevant tests.
expected_behavior: >-
  Markdown reports render all three existing comparison ratios honestly and
  deterministically, including n/a for zero-denominator comparisons.
test_command: [/usr/bin/env, PYTHONPATH=src:tests, python3, -m, unittest, discover, -s, tests]
static_check_commands:
  - [ruff, check, src, tests]
allowed_files:
  - src/sigmap_codex_bridge/reporting.py
  - tests/test_reporting.py
  - docs/benchmark-specification.md
expected_files:
  - src/sigmap_codex_bridge/reporting.py
  - tests/test_reporting.py
  - docs/benchmark-specification.md
expected_symbols: [render_markdown]
timeout_seconds: 600
repetitions: 3
